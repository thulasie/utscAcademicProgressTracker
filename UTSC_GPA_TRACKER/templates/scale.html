<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GPA Scale</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  {% include "nav.html" %}

  <div class="page">
    <div class="card">
      <h2>UTSC GPA Scale</h2>
      <table class="scale-table">
        <tr><th>Letter</th><th>GPA Points</th><th>Percentage Range</th></tr>
        <tr> <td>A+</td> <td>4.0</td> <td>85 – 100%</td> </tr>
        <tr> <td>A</td> <td>3.7</td> <td>80 – 84%</td> </tr>
        <tr> <td>A-</td> <td>3.3</td> <td>77 – 79%</td> </tr>
        <tr> <td>B+</td> <td>3.0</td> <td>73 – 76%</td> </tr>
        <tr> <td>B</td> <td>2.7</td> <td>70 – 72%</td> </tr>
        <tr> <td>B-</td> <td>2.3</td> <td>67 – 69%</td> </tr>
        <tr> <td>C+</td> <td>2.0</td> <td>63 – 66%</td> </tr>
        <tr> <td>C</td> <td>1.7</td> <td>60 – 62%</td> </tr>
        <tr> <td>C-</td> <td>1.3</td> <td>57 – 59%</td> </tr>
        <tr> <td>D+</td> <td>1.0</td> <td>53 – 56%</td> </tr>
        <tr> <td>D</td> <td>0.7</td> <td>50 – 52%</td> </tr>
        <tr> <td>F</td> <td>0.0</td> <td>0 – 49%</td> </tr>
      </table>
    </div>

  </div>

</body>
</html>
