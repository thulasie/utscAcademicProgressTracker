<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>UTSC Grade Tracker — My Courses</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  {% include "nav.html" %}

  <div class="page">

    <!-- ADD COURSE -->
    <div class="card">
      <h2>Add a Course</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="course-name">Course Code</label>
          <input type="text" id="course-name" placeholder="e.g. CSCB20" style="width:180px;" />
        </div>
        <button onclick="addCourse()" style="align-self:flex-end;">Add Course</button>
      </div>
    </div>

    <!-- COURSES LIST -->
    <div id="courses-area">
      <p style="color:#888;">Loading...</p>
    </div>

  </div>

  <script src="/static/courses.js"></script>
</body>
</html>
