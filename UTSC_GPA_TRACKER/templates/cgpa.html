<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My cGPA</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  {% include "nav.html" %}

  

  <div class="page">
    <div class="card">
      <h2>My Cumulative GPA</h2>

      <div class="cgpa-header-row">
        <div>
          <div class="cgpa-number" id="cgpa-value">—</div>
          <div class="cgpa-letter" id="cgpa-letter">No graded courses yet</div>
        </div>
        <div class="info-item">
          Total credits counted: <strong id="cgpa-credits">0</strong>
          <br/>
          <small style="color:#888;">Each course at UTSC is worth 0.5 credits</small>
        </div>
      </div>

      <h3>Course Breakdown</h3>
      <div id="cgpa-breakdown">
        <p style="color:#888;">Your breakdown will appear here when graded courses are added.</p>
      </div>
    </div>
  </div>




  <script src="/static/cgpa.js"></script>
</body>
</html>
